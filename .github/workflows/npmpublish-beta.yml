# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://help.github.com/actions/language-and-framework-guides/publishing-nodejs-packages

name: Node.js Publish Beta version

on:
  push:
    branches:
      - 'v*.*-beta'
    tags:
      - 'v*.*.*-beta'
    paths-ignore:
      - '.github/workflows/npmpublish-main.yml'
      - '.github/workflows/npmpublish-lts.yml'

jobs:
  check_version:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v3.3.0
      - id: check
        name: Check if version is beta
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/(tags|heads)/v.*-beta$ ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check_version
    if: needs.check_version.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3.3.0
      - uses: actions/setup-node@v3.6.0
        with:
          node-version: 16
      - run: npm ci
      - run: npm test

  publish-npm:
    needs: [check_version, build]
    if: needs.check_version.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3.3.0
      - uses: actions/setup-node@v3.6.0
        with:
          node-version: 16
          registry-url: https://registry.npmjs.org/
      - name: Set up NPM authentication
        run: echo "registry=https://registry.npmjs.org/:_authToken=${{secrets.NPM_TOKEN}}" >> ~/.npmrc
      - run: npm ci
      - run: npm publish --tag ${GITHUB_REF##*/}
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
